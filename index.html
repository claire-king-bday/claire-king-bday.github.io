<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claire King's 21st 🎂</title>
  <link rel="icon" type="image/webp" href="assets/wink_star.webp" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'VT323', monospace;
      -webkit-tap-highlight-color: transparent;
      color: #000;
    }

    /* ── Rainbow holographic background ── */
    .intro-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        135deg,
        #ff7eb3, #ff9a8b, #ffe66d, #a8ff9e,
        #8bd3ff, #c89bff, #ff7eb3
      );
      background-size: 300% 300%;
      animation: intro-gradient 6s ease infinite;
    }

    .intro-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(255, 255, 255, 0.5) 48%,
        rgba(200, 240, 255, 0.4) 52%,
        transparent 65%
      );
      background-size: 220% 220%;
      animation: holo-shimmer 5s linear infinite;
      mix-blend-mode: overlay;
    }

    @keyframes intro-gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes holo-shimmer {
      0% { background-position: 220% 0%; }
      100% { background-position: -220% 0%; }
    }

    /* ── Particle layers ── */
    #confetti-canvas,
    #glitter-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    #glitter-canvas { z-index: 2; mix-blend-mode: screen; }

    /* ── Centered intro content ── */
    .intro-content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-align: center;
      padding: 24px 20px max(40px, env(safe-area-inset-bottom));
    }

    /* ── RuPaul cut-out floats up from the bottom ── */
    .rup-hero {
      position: absolute;
      bottom: -110%;
      left: 50%;
      transform: translateX(-50%);
      width: min(64vw, 300px);
      height: auto;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.35));
      z-index: 1;
      pointer-events: none;
    }

    .rup-hero.enter {
      animation: float-up 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes float-up {
      0% { bottom: -110%; opacity: 0; }
      25% { opacity: 1; }
      100% { bottom: 6%; opacity: 1; }
    }

    .rup-hero.floating {
      bottom: 6%;
      animation: gentle-bob 4s ease-in-out infinite;
    }

    @keyframes gentle-bob {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-1.5deg); }
      50% { transform: translateX(-50%) translateY(-12px) rotate(1.5deg); }
    }

    .rup-hero.dim {
      transition: opacity 0.4s ease, filter 0.4s ease;
      opacity: 0.12;
      filter: blur(3px);
    }

    /* ── Invite text (clean, staggered like pomodoro) ── */
    .invite {
      position: relative;
      z-index: 2;
      max-width: 540px;
      margin-bottom: 8px;
    }

    .invite-line {
      font-family: 'VT323', monospace;
      line-height: 0.95;
      margin: 0;
      color: #000;
      text-shadow: 3px 3px 0 #fff, -1px -1px 0 rgba(255, 255, 255, 0.8);
      opacity: 0;
      animation-play-state: paused;
    }

    .invite-line-1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      animation: slide-left 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .invite-line-2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 13vw, 6rem);
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow:
        3px 3px 0 #ff2e9a,
        6px 6px 0 #7b2fff,
        0 0 18px rgba(255, 255, 255, 0.6);
      animation: scale-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.4s;
    }

    .invite-line-3 {
      font-size: clamp(1.5rem, 5.5vw, 2.4rem);
      animation: wiggle-in 0.8s ease forwards;
      animation-delay: 0.8s;
    }

    @keyframes slide-left {
      from { opacity: 0; transform: translateX(-60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scale-bounce {
      from { opacity: 0; transform: scale(0); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes wiggle-in {
      from { opacity: 0; transform: rotate(-8deg) scale(0.85); }
      to { opacity: 1; transform: rotate(0) scale(1); }
    }

    /* ── Crazy RuPaul moment ── */
    .drag-moment {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 24px 20px max(40px, env(safe-area-inset-bottom));
      text-align: center;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .drag-moment.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .drag-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 3.6rem);
      letter-spacing: 0.03em;
      line-height: 1.0;
      color: #fff;
      max-width: 600px;
      margin: 0 0 18px;
      text-shadow:
        3px 3px 0 #ff2e9a,
        6px 6px 0 #7b2fff,
        0 0 20px rgba(255, 255, 255, 0.6);
      opacity: 0;
      transform: translateY(40px);
    }

    .drag-text.show {
      animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .crazy-rup {
      width: min(78vw, 340px);
      border-radius: 14px;
      border: 5px solid #fff;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: scale(0.6) rotate(-4deg);
    }

    .crazy-rup.pop {
      animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s forwards;
    }

    @keyframes pop-in {
      0% { opacity: 0; transform: scale(0.6) rotate(-4deg); }
      60% { opacity: 1; transform: scale(1.06) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Tap prompt ── */
    .tap-prompt {
      position: fixed;
      bottom: max(22px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      z-index: 30;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      color: #000;
      text-shadow: 2px 2px 0 #fff;
      opacity: 0;
      white-space: nowrap;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .tap-prompt.show {
      animation: fade-up 0.6s ease forwards, tap-pulse 1.8s ease-in-out 0.8s infinite;
    }

    @keyframes tap-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-height: 600px) {
      .rup-hero.enter { animation-name: float-up-short; }
      @keyframes float-up-short {
        0% { bottom: -110%; opacity: 0; }
        25% { opacity: 1; }
        100% { bottom: 1%; opacity: 1; }
      }
      .rup-hero.floating { bottom: 1%; }
      .crazy-rup { width: min(64vw, 260px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-bg, .intro-bg::before,
      .rup-hero, .invite-line, .drag-text, .crazy-rup, .tap-prompt {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .rup-hero { bottom: 6%; transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="intro-bg" aria-hidden="true"></div>
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <canvas id="glitter-canvas" aria-hidden="true"></canvas>

  <main class="intro-content">
    <img
      class="rup-hero"
      id="rup-hero"
      src="assets/claire-king/rup-cut-out.png"
      alt="RuPaul in gold"
      draggable="false"
    />

    <div class="invite" id="invite">
      <p class="invite-line invite-line-1">you have been invited to</p>
      <p class="invite-line invite-line-2">Claire King's</p>
      <p class="invite-line invite-line-3">super special 21st birthday party</p>
    </div>
  </main>

  <div class="drag-moment" id="drag-moment" aria-hidden="true">
    <p class="drag-text" id="drag-text">a DRAAAAG QUEEN?? IM THE QUEEN OF DRAG!</p>
    <img
      class="crazy-rup"
      id="crazy-rup"
      src="assets/claire-king/crazy-rup.jpg"
      alt="RuPaul going crazy"
      draggable="false"
    />
  </div>

  <p class="tap-prompt" id="tap-prompt">tap to see the details ✨</p>

  <script>
    (function () {
      /* ── Confetti + glitter particles ── */
      const confettiCanvas = document.getElementById('confetti-canvas');
      const glitterCanvas = document.getElementById('glitter-canvas');
      const ctxC = confettiCanvas.getContext('2d');
      const ctxG = glitterCanvas.getContext('2d');

      function resizeCanvases() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        [confettiCanvas, glitterCanvas].forEach(c => {
          c.width = window.innerWidth * dpr;
          c.height = window.innerHeight * dpr;
          c.style.width = window.innerWidth + 'px';
          c.style.height = window.innerHeight + 'px';
        });
        ctxC.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctxG.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resizeCanvases();
      window.addEventListener('resize', resizeCanvases);

      const RAINBOW = ['#ff2e9a','#ff8c00','#ffe600','#00d97e','#00cfff','#7b2fff','#ff69b4','#fff'];

      function makeConfetti(n) {
        return Array.from({ length: n }, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight - window.innerHeight,
          w: 6 + Math.random() * 7,
          h: 4 + Math.random() * 5,
          color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
          rot: Math.random() * 360,
          spin: (Math.random() - 0.5) * 6,
          vy: 1.2 + Math.random() * 2.2,
          vx: (Math.random() - 0.5) * 1.6,
          opacity: 0.7 + Math.random() * 0.3,
        }));
      }

      function makeGlitter(n) {
        return Array.from({ length: n }, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: 1 + Math.random() * 2.5,
          color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
          twinkle: Math.random() * Math.PI * 2,
          speed: 0.02 + Math.random() * 0.04,
        }));
      }

      let confetti = makeConfetti(80);
      let glitter = makeGlitter(110);

      function drawConfetti() {
        ctxC.clearRect(0, 0, window.innerWidth, window.innerHeight);
        confetti.forEach(p => {
          p.y += p.vy;
          p.x += p.vx;
          p.rot += p.spin;
          if (p.y > window.innerHeight + 20) {
            p.y = -20;
            p.x = Math.random() * window.innerWidth;
          }
          ctxC.save();
          ctxC.translate(p.x, p.y);
          ctxC.rotate((p.rot * Math.PI) / 180);
          ctxC.globalAlpha = p.opacity;
          ctxC.fillStyle = p.color;
          ctxC.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctxC.restore();
        });
      }

      function drawGlitter() {
        ctxG.clearRect(0, 0, window.innerWidth, window.innerHeight);
        glitter.forEach(g => {
          g.twinkle += g.speed;
          const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(g.twinkle));
          ctxG.beginPath();
          ctxG.arc(g.x, g.y, g.r, 0, Math.PI * 2);
          ctxG.fillStyle = g.color;
          ctxG.globalAlpha = alpha;
          ctxG.fill();
          if (g.r > 2) {
            ctxG.globalAlpha = alpha * 0.6;
            ctxG.fillRect(g.x - g.r * 3, g.y - 0.5, g.r * 6, 1);
            ctxG.fillRect(g.x - 0.5, g.y - g.r * 3, 1, g.r * 6);
          }
        });
        ctxG.globalAlpha = 1;
      }

      function loop() {
        drawConfetti();
        drawGlitter();
        requestAnimationFrame(loop);
      }
      loop();

      function burstConfetti() {
        for (let i = 0; i < 70; i++) {
          confetti.push({
            x: window.innerWidth / 2 + (Math.random() - 0.5) * 220,
            y: window.innerHeight * 0.55,
            w: 7 + Math.random() * 9,
            h: 5 + Math.random() * 7,
            color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)],
            rot: Math.random() * 360,
            spin: (Math.random() - 0.5) * 12,
            vy: -(3 + Math.random() * 6),
            vx: (Math.random() - 0.5) * 8,
            opacity: 1,
          });
        }
      }

      /* ── Animation sequence ── */
      const rupHero = document.getElementById('rup-hero');
      const invite = document.getElementById('invite');
      const dragMoment = document.getElementById('drag-moment');
      const dragText = document.getElementById('drag-text');
      const crazyRup = document.getElementById('crazy-rup');
      const tapPrompt = document.getElementById('tap-prompt');

      const wait = ms => new Promise(r => setTimeout(r, ms));

      async function runSequence() {
        await wait(400);
        rupHero.classList.add('enter');

        await wait(1350);
        rupHero.classList.remove('enter');
        rupHero.classList.add('floating');
        // invite lines reveal via their own staggered CSS delays
        invite.querySelectorAll('.invite-line').forEach(el => {
          el.style.animationPlayState = 'running';
        });

        await wait(3000);
        rupHero.classList.remove('floating');
        rupHero.classList.add('dim');
        dragMoment.classList.add('active');
        dragMoment.removeAttribute('aria-hidden');
        dragText.classList.add('show');

        await wait(350);
        crazyRup.classList.add('pop');
        burstConfetti();

        await wait(2200);
        tapPrompt.classList.add('show');
      }

      runSequence();

      /* placeholder — details screen comes later */
      tapPrompt.addEventListener('click', () => {
        /* no-op for now */
      });
    })();
  </script>
</body>
</html>
